<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CookCook</title>
    <link rel="stylesheet" href="css/base.css?v=1.0.4">
    <link rel="stylesheet" href="css/home.css?v=1.0.4">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="js/data.js?v=1.0.5"></script>
</head>
<body>
    <!-- Top Action Bar -->
    <header class="top-bar" id="topBar">
        <div class="search-box">
            <i class="fa-solid fa-search"></i>
            <input type="text" id="searchInput" placeholder="搜索你感兴趣的美食...">
        </div>
        <div class="sort-actions">
            <div class="custom-dropdown" id="sortDropdown">
                <div class="dropdown-trigger" id="sortTrigger"><span>最新</span> <i class="fa-solid fa-chevron-down"></i></div>
                <div class="dropdown-menu" id="sortMenu">
                    <div class="dropdown-item active" data-val="time">最新</div>
                    <div class="dropdown-item" data-val="difficulty">难度</div>
                    <div class="dropdown-item" data-val="duration">时长</div>
                    <div class="dropdown-item" data-val="proficiency">熟练</div>
                </div>
            </div>
            <button id="sortOrderBtn" class="sort-order-btn" data-order="desc">
                <i class="fa-solid fa-arrow-down-short-wide"></i>
            </button>
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="container">
        <!-- Home / 首页 (瀑布流区) -->
        <div id="homeView" class="view-section active">
            <div class="recipe-masonry" id="recipeGrid">
                <!-- Recipes will be dynamically injected here -->
            </div>
        </div>

        <!-- Ingredients / 食材 (待开发) -->
        <div id="ingredientsView" class="view-section">
            <div style="padding: 2rem; text-align: center; color: var(--text-muted);">
                <h2>食材匹配功能开发中...</h2>
            </div>
        </div>
        
        <div id="publishView" class="view-section">
            <div style="padding: 2rem; text-align: center; color: var(--text-muted);">
                <h2>发布功能开发中...</h2>
            </div>
        </div>
        
        <div id="menuView" class="view-section">
            <div style="padding: 2rem; text-align: center; color: var(--text-muted);">
                <h2>点菜清单开发中...</h2>
            </div>
        </div>
        
        <div id="profileView" class="view-section">
            <div class="profile-header">
                <img id="profileAvatar" src="public/images/avatars/seikai.webp" alt="avatar">
                <h2 id="profileName">Username</h2>
            </div>
            
            <div class="profile-stats">
                <div class="stat-card">
                    <div class="stat-val" id="statCooked">0</div>
                    <div class="stat-label">做菜总次数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-val" id="statDuration">0h</div>
                    <div class="stat-label">总时长</div>
                </div>
                <div class="stat-card">
                    <div class="stat-val" id="statPublished">0</div>
                    <div class="stat-label">发布菜谱</div>
                </div>
            </div>
            
            <div class="profile-actions">
                <button class="logout-btn" onclick="window.logout()">退出登录</button>
            </div>
        </div>
    </main>

    <!-- Bottom Tab Bar -->
    <div class="bottom-tab-wrapper">
        <nav class="bottom-tab-bar">
            <div class="tab-item active" data-view="homeView">
                <i class="fa-solid fa-house"></i>
            </div>
            <div class="tab-item" data-view="ingredientsView">
                <i class="fa-solid fa-carrot"></i>
            </div>
            <div class="tab-item publish-tab" data-view="publishView">
                <div class="publish-btn">
                    <i class="fa-solid fa-plus"></i>
                </div>
            </div>
            <div class="tab-item" data-view="menuView">
                <i class="fa-solid fa-list-check"></i>
            </div>
            <div class="tab-item" data-view="profileView">
                <i class="fa-solid fa-user"></i>
            </div>
        </nav>
    </div>

    <!-- Recipe Detail Modal -->
    <div class="modal" id="recipeModal">
        <div class="modal-content">
            <button class="close-btn" id="closeModal">&times;</button>
            <div id="recipeDetailContainer"></div>
        </div>
    </div>

    <!-- Edit Recipe Modal -->
    <div class="modal" id="editRecipeModal">
        <div class="modal-content" style="padding: 2rem; border-radius: 24px; background: var(--bg-main);">
            <button class="close-btn" id="closeEditModal" style="background: rgba(0,0,0,0.05);">&times;</button>
            <h2 style="margin-bottom: 1.5rem; color: var(--text-main); font-weight: 800;">编辑菜谱</h2>
            
            <div style="margin-bottom: 1rem;">
                <label style="display:block; margin-bottom:0.5rem; font-size:0.9rem; font-weight:600;">难度 (1-5)</label>
                <input type="number" id="editDifficulty" min="1" max="5" style="width:100%; padding: 0.8rem; border-radius:12px; border:1px solid var(--glass-border); background:rgba(0,0,0,0.02); outline:none;">
            </div>
            <div style="margin-bottom: 1rem;">
                <label style="display:block; margin-bottom:0.5rem; font-size:0.9rem; font-weight:600;">时长 (分钟)</label>
                <input type="number" id="editDuration" style="width:100%; padding: 0.8rem; border-radius:12px; border:1px solid var(--glass-border); background:rgba(0,0,0,0.02); outline:none;">
            </div>
            <div style="margin-bottom: 1rem;">
                <label style="display:block; margin-bottom:0.5rem; font-size:0.9rem; font-weight:600;">食材 (每行一个，格式：名称 数量)</label>
                <textarea id="editIngredients" rows="4" style="width:100%; padding: 0.8rem; border-radius:12px; border:1px solid var(--glass-border); background:rgba(0,0,0,0.02); outline:none; resize:none;"></textarea>
            </div>
            <div style="margin-bottom: 1.5rem;">
                <label style="display:block; margin-bottom:0.5rem; font-size:0.9rem; font-weight:600;">佐料 (每行一个)</label>
                <textarea id="editSeasonings" rows="3" style="width:100%; padding: 0.8rem; border-radius:12px; border:1px solid var(--glass-border); background:rgba(0,0,0,0.02); outline:none; resize:none;"></textarea>
            </div>
            
            <button id="saveEditBtn" style="width:100%; padding: 1rem; border-radius: 16px; background: var(--text-main); color: white; border:none; font-weight: bold; font-size: 1rem; cursor:pointer;">保存修改 (临时生效)</button>
        </div>
    </div>

    <!-- Add Note Modal -->
    <div class="modal" id="addNoteModal" style="z-index: 1005;">
        <div class="modal-content" style="padding: 2rem; border-radius: 24px; background: var(--bg-main);">
            <button class="close-btn" id="closeNoteModal" style="background: rgba(0,0,0,0.05);">&times;</button>
            <h2 style="margin-bottom: 1.5rem; color: var(--text-main); font-weight: 800;">添加心得笔记</h2>
            
            <div style="margin-bottom: 1rem;">
                <label style="display:block; margin-bottom:0.5rem; font-size:0.9rem; font-weight:600;">选择步骤</label>
                <select id="noteStepSelect" style="width:100%; padding: 0.8rem; border-radius:12px; border:1px solid var(--glass-border); background:rgba(0,0,0,0.02); outline:none; font-family:inherit;">
                </select>
            </div>
            
            <div style="margin-bottom: 1.5rem;">
                <label style="display:block; margin-bottom:0.5rem; font-size:0.9rem; font-weight:600;">笔记内容</label>
                <textarea id="noteContentInput" rows="4" style="width:100%; padding: 0.8rem; border-radius:12px; border:1px solid var(--glass-border); background:rgba(0,0,0,0.02); outline:none; resize:none;" placeholder="输入你的做菜心得..."></textarea>
            </div>
            
            <button id="saveNoteBtn" style="width:100%; padding: 1rem; border-radius: 16px; background: var(--text-main); color: white; border:none; font-weight: bold; font-size: 1rem; cursor:pointer;">保存笔记 (临时生效)</button>
        </div>
    </div>

    <script src="js/home.js?v=1.0.4"></script>
</body>
</html>
